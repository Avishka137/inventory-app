name: CI

# Runs automatically on every push and pull request to main.
# This is CI only (no deploy step yet) - it just proves the code
# still installs cleanly and has no syntax/build errors before merging.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Syntax / import check
        working-directory: backend
        run: |
          # No pytest suite yet - this at minimum catches syntax errors,
          # bad imports, and typos before they reach main.
          python -m py_compile *.py

      - name: Lint for undefined names / broken syntax
        working-directory: backend
        run: |
          pip install flake8
          # Only fails on actual errors (undefined vars, syntax issues),
          # not style nitpicks - safe to run before you've set up a style guide.
          flake8 . --select=E9,F63,F7,F82 --show-source

  frontend-build:
    name: Frontend (Vue + Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build